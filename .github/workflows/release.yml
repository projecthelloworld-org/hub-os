name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Verify release artifacts
        working-directory: release
        run: sha256sum --check SHA256SUMS
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "release/hubos-$GITHUB_REF_NAME.tar.gz" \
            "release/hubos-$GITHUB_REF_NAME.spdx.json" \
            release/SHA256SUMS \
            --verify-tag \
            --generate-notes \
            --title "HubOS $GITHUB_REF_NAME"
