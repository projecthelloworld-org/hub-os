name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: services/hubos
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun test
      - run: bun run check
      - run: bun audit --audit-level=moderate
      - name: Validate core Compose configuration
        working-directory: .
        run: make compose-config
      - name: Validate installer syntax
        working-directory: .
        run: bash -n install.sh

  sbom:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          artifact-name: hubos-sbom.spdx.json
